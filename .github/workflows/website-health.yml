name: Website Health Monitor

on:
  schedule:
    # Daily 7:00 AM Eastern during daylight time = 11:00 UTC.
    - cron: "0 11 * * *"
    # Weekly Sunday summary at 8:00 AM Eastern during daylight time.
    - cron: "0 12 * * 0"
    # Monthly report on the 1st at 8:30 AM Eastern during daylight time.
    - cron: "30 12 1 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Report mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine report mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            DOW=$(date -u +%u)
            DOM=$(date -u +%d)
            if [ "$DOM" = "01" ]; then
              echo "mode=monthly" >> "$GITHUB_OUTPUT"
            elif [ "$DOW" = "7" ]; then
              echo "mode=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "mode=daily" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run website crawler
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python crawler.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Upload health reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-health-reports
          path: reports/
